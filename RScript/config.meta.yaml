# Meta-model configuration for SleepMetaModel.R
# This file is intentionally separate from SleepTempFinder main config to
# keep the meta-regression workflow independent.

lifestyle:
  # directory where extracted LifestyleLogging CSVs are stored or discovered
  default_lifestyle_dir: "../LifestyleLoggingExtractor/Out"
  # column name containing the date for each lifestyle entry
  csv_date_col: "date"
  # override raw lifestyle boolean labels if the CSV uses a different wording
  columns:
    Display_30min_off: "Displays 30min vor dem Schlafen aus"
    Display_1h_off: "Displays eine H vor dem Schlafen aus"
    Traveling_Vacation: "Traveling/Vacation"
    Late_Meals: "Late Meals"
    Heavy_Meals: "Heavy Meals"
    Window_Open: "Fenster offen beim Schlafen"
    Sleep_Sounds: "Sleep Sounds"
    Light_Exercise: "Light Exercise"
    Moderate_Exercise: "Moderate Exercise"
    Vigorous_Exercise: "Vigorous Exercise"
    Light_Exercise_Before_Bed: "Light Exercise Before Bed"
    Moderate_Exercise_Before_Bed: "Moderate Exercise Before Bed"
    Vigorous_Exercise_Before_Bed: "Vigorous Exercise Before Bed"

model:
  # path to the raw lifestyle extractor script; can be overridden in private config
  raw_extractor_script: "../LifestyleLoggingExtractor/extract_lifestyle_logging.py"
  # optional raw Garmin lifestyle source paths or directories can be passed explicitly

meta:
  outcome_variables:
    - Sleep_Score
    - RHR
    - Skin_Temperature
    - HRV
  base_predictors:
    - Avg_Temp
    - Temp_SD
    - Avg_Rel_Hum
    - Rel_Hum_SD
    - Avg_Abs_Hum
    - Abs_Hum_SD
  factor_columns:
    - Display_30min_off
    - Display_1h_off
    - Display_Off_Level
    - Exercise_Level
    - Exercise_Level_Before_Bed
    - Traveling_Vacation
    - Late_Meals
    - Heavy_Meals
    - Window_Open
    - Sleep_Sounds
    - Light_Exercise
    - Moderate_Exercise
    - Vigorous_Exercise
    - Light_Exercise_Before_Bed
    - Moderate_Exercise_Before_Bed
    - Vigorous_Exercise_Before_Bed
  derived_factors:
    - name: Display_Off_Level
      levels:
        1: Display_30min_off
        2: Display_1h_off
      labels:
        0: none
        1: 30min
        2: 1h
    - name: Exercise_Level
      levels:
        1:
          - Light_Exercise
        2:
          - Moderate_Exercise
        3:
          - Vigorous_Exercise
      labels:
        0: none
        1: light
        2: moderate
        3: vigorous
    - name: Exercise_Level_Before_Bed
      levels:
        1:
          - Light_Exercise_Before_Bed
        2:
          - Moderate_Exercise_Before_Bed
        3:
          - Vigorous_Exercise_Before_Bed
      labels:
        0: none
        1: light
        2: moderate
        3: vigorous
  interaction_terms:
    - Avg_Temp:Display_30min_off
    - Avg_Temp:Exercise_Level
    - Avg_Temp:Exercise_Level_Before_Bed
    - Display_1h_off:Exercise_Level_Before_Bed
  meta_interaction_terms:
    - Outcome:Avg_Temp
    - Outcome:Display_Off_Level
    - Outcome:Exercise_Level
    - Outcome:Exercise_Level_Before_Bed

# --- GLOBAL PATH SETTINGS ---
data_directory: "../data"

# --- COLUMN MAPPING ---
column_names:
  garmin_date: "Sleep Score 4 Wochen"
  garmin_bedtime: "Schlafenszeit"
  garmin_waketime: "Aufstehzeit"
  garmin_sleep_score: "Score"
  garmin_hrv: "HFV-Status"
  garmin_rhr: "Ruheherzfrequenz"
  garmin_duration: "Dauer"
  garmin_spo2: "Pulsoximeter"
  garmin_skin_temp: "Veränderung der Hauttemperatur"
  garmin_resp: "Atmung"
  garmin_body_bat: "Body Battery"
  garmin_quality: "Qualität"

# --- SENSOR & FILE INVENTORY ---
temp_files:
  FlorianZimmerSensor: 
    path: "ThermometerZimmerFlorian_data.csv"
    col_time: "Date"
    col_temp: "Temperature_Celsius(℃)"
    col_hum: "Relative_Humidity(%)"

# --- QUALITY MAPPING ---
quality_mapping:
  ausgezeichnet: 4
  gut: 3
  befriedigend: 2
  schlecht: 1

usage_timeline:
  - { file_id: "FlorianZimmerSensor", start: "2020-01-01", end: "2030-12-31" }

sleep_data_sources: ["Schlaf(5).csv"]

# --- CALENDAR SOURCE (SENSOR & FLAGS) ---
calendar_source:
  enabled: true
  mode: "url" # options: "url" or "file"
  url: "https://calendar.google.com/calendar/ical/NTEwMjZkNjM5NDRiMWUxNGZkMmQwN2ZiMDk5MGJhYWZlOTY0OGVjNjc5NTVjMGM2NDBhYTYzMGU2MmMyZGIwNUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t/public/basic.ics"
  file_path: ""

calendar_assignment:
  require_prev_next_day: true
  apply_separately_for_sensor_and_flags: true

calendar_parser:
  tolerant: true
  event_field_priority: ["SUMMARY", "DESCRIPTION"]

analysis_filter:
  enabled: false
  sensor_include: []
  flags_include: []
  flags_mode: "any" # options: "any" or "all"

# --- OUTLIER FILTER ---
outlier_filter:
  enabled: true
  method: "iqr" # options: "iqr" or "zscore"
  iqr_multiplier: 1.5
  z_threshold: 3
  apply_stage: "sensor" # "sensor" or "nightly"
  columns: ["room_temp", "rel_hum", "abs_hum"]


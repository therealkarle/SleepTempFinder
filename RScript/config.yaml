# --- GLOBAL PATH SETTINGS ---
# base directory containing dated subfolders with CSV exports
# (usually kept at project root/data)
data_directory: "../data"

verbose: false

# Sleep input mode:
# - csv: keep the current file scan under data_directory
# - api: fetch sleep data from the Sleep Score Private API
sleep_source:
  mode: "csv"
  api:
    base_url: "https://sleepscoreprivate.onrender.com"
    user_id: ""
    user_email: ""
    bearer_token: ""

# --- PARSING SETTINGS ---
# lists of orders passed to lubridate::parse_date_time
parse_orders:
  garmin_datetime:
    - "Ymd HMS"
    - "Ymd HM"
    - "Y-m-d H:M:S"
    - "Y-m-d H:M"
    - "Y-m-d"
  garmin_time:
    - "H:M"
    - "HM"
  sensor_timestamp:
    - "d/m/Y H:M"
    - "dmY HM"
    - "Ymd HMS"

# locale settings for CSV imports
locale:
  decimal_mark: ","

# matching padding (minutes) applied when matching sensor rows to sleep windows
matching_padding_minutes: 30

# summary interval for reported value ranges (0.90 = 90% value interval)
summary_interval: 0.80

# scan behaviour: if recursive is true, every CSV under data_directory (subfolders included)
# will be inspected. Useful when sensor or sleep files are placed in date-named subfolders.
scan_recursive: true

# --- COLUMN MAPPING ---
column_names:
  garmin_date: "Sleep Score 4 Wochen"
  garmin_date_alt: "Datum"
  garmin_bedtime: "Schlafenszeit"
  garmin_waketime: "Aufstehzeit"
  garmin_sleep_score: "Score"
  garmin_hrv: "HFV-Status"
  garmin_hrv_alt: "Ø HFV über Nacht"
  garmin_rhr: "Ruheherzfrequenz"
  garmin_duration: "Dauer"
  garmin_spo2: "Pulsoximeter"
  garmin_skin_temp: "Veränderung der Hauttemperatur"
  garmin_resp: "Atmung"
  garmin_body_bat: "Body Battery"
  garmin_quality: "Qualität"

# --- SENSOR FILES ---
# sensor definitions list each distinct room‑sensor CSV format encountered
# in the data directory.  The path value is only required when you want to
# explicitly identify a file by name; the script will otherwise scan all
# CSVs under `data_directory` and match based on column headers.
#
# Each sensor entry may include an optional `nickname` field.  This provides a
# friendly alias that can be used in calendar metadata (e.g. `sensor=Hochliten`)
# while still mapping back to the canonical config key.  The nickname may be
# a single string or a list of strings if you want multiple acceptable names
# for the same sensor.  The nickname(s) are ignored when reading the CSVs
# themselves and are only used for calendar matching and validation.
#
# add any additional sensors you spot in `data/` here.  In the workspace the
# only sensor present is the ThermometerZimmerFlorian file, so that entry is
# already included below.
#
# A sensor entry may define `default: true`; this sensor will be used for any
# night without an explicit calendar-assigned sensor. Only one sensor should
# have default=true, otherwise the first matching entry is used.
#
# NOTE: the older key name `temp_files` is recognised for backwards
# compatibility, but `sensor_files` is now preferred — it more clearly
# describes the purpose.
sensor_files:
  FlorianZimmerSensor: 
    # optional friendly name for calendar events
    nickname: "Zuhause"
    path: "ThermometerZimmerFlorian_data.csv"
    col_time: "Date"
    col_temp: "Temperature_Celsius(℃)"
    col_hum: "Relative_Humidity(%)"
    default: true # if true, this sensor will be assigned to calendar events with no sensor specified; only one sensor should have this set to true
  
  WohnwagenSensor:
    # the caravan sensor has historically been referred to as "Hochliten" or
    # "Hochlitten"; allow several variants plus a plain "Wohnwagen" label so
    # calendar entries can be more forgiving.
    nickname:
      - "Hochlitten"
      - "Hochliten"
      - "Wohnwagen"
      - "WohnwagenSensor"
    path: "Wohnwagen_data.csv"
    col_time: "Date"
    col_temp: "Temperature_Celsius(℃)"
    col_hum: "Relative_Humidity(%)"
    
    
  WohnmobilAussen: 
    nickname:
      - "Wohnmobil Außen"
      - "WohnmobilAußen"
    path: "Wohnmobil Außen_data.csv"
    col_time: "Date"
    col_temp: "Temperature_Celsius(℃)"
    col_hum: "Relative_Humidity(%)"
    
  WohnmobilInnen: 
    nickname: "Wohnmobil"
    path: "Wohnmobil Innen_data.csv"
    col_time: "Date"
    col_temp: "Temperature_Celsius(℃)"
    col_hum: "Relative_Humidity(%)"
    
    

# --- QUALITY MAPPING ---
quality_mapping:
  ausgezeichnet: 4
  gut: 3
  befriedigend: 2
  schlecht: 1



# list of Garmin sleep exports; if omitted or incomplete the script will
# also scan all CSVs under data_directory and classify them by header.
# canonicalization: filenames are stripped of trailing " (1)" etc. and any
# name containing "schlaf" becomes simply "Sleep" in summaries.
# leave empty or adjust to match actual filenames; using [] lets the script
# autodetect all sleep files.
sleep_data_sources: []

# --- CALENDAR SOURCE (SENSOR & FLAGS) ---
# optional default sensor name used when no sensor is assigned in the
# calendar. For new configs, prefer using `default: true` inside the
# `sensor_files` entry. If that is missing, this fallback value is still
# accepted for backwards compatibility.
# The name supplied by the calendar may refer either to the config key or to
# a sensor's optional `nickname` (case‑insensitive).  If the script is unable
# to resolve a calendar value to a known sensor it will print a warning and
# prefix the value with "UNKNOWN:" in the Sensor column so you can spot the
# problem.
#
# Calendar events may include metadata in their SUMMARY/DESCRIPTION such as
#   sensor=LivingRoom; flags=quiet,fan
# The parser will recognise a `sensor=` assignment and an optional
# `flag`/`flags=` declaration that can appear after the sensor or in a
# different field; multiple flags may be supplied as a comma-separated list
# (semicolon separators are also tolerated).  The Flags value will appear in
# the calendar output and can be used for filtering.
calendar_default_sensor: "FlorianZimmerSensor"


calendar_assignment:
  # when true the script only keeps sensor/flag values that appear on the
  # previous and next day as well (three‑day smoothing).  With wake‑date
  # semantics this is usually no longer desired, so the default is now false.
  require_prev_next_day: false
  apply_separately_for_sensor_and_flags: true
  # if true, the first day of a multi‑day calendar event is ignored when
  # assigning sensors/flags.  This is handy for multi‑day “block” entries
  # where the start date should not carry metadata.  A single‑day event will
  # still be applied as usual.
  ignore_event_start: true

calendar_parser:
  tolerant: true
  event_field_priority: ["SUMMARY", "DESCRIPTION"]

# analysis_filter may be used to restrict the dataset after the
# initial run.  It accepts the same fields as the --filter CLI option and
# is merged with any filter provided on the command line (CLI takes
# precedence).  Date ranges cannot be specified in the config; use the
# --filter string for that.
#
# example CLI values:
#   --filter="2025"                    # all of 2025
#   --filter="q1.2025;Flags=Hochlitten"  # first quarter with specific flag
#   --filter="01.2025;Sensors=Wohnwagen" # January 2025 and a sensor
#   --filter="02.02.2026,04.03.2026"     # 2 Feb through 4 Mar 2026
analysis_filter:
  enabled: false
  sensor_include: []
  flags_include: []
  flags_mode: "any" # options: "any" or "all"
  # optional metric/biomarker expressions; each string is evaluated with
  # dplyr/filter semantics after sensor/flag filtering.  Common shorthand
  # names are accepted (e.g. "temp" → Avg_Temp, "SleepScore" → Sleep_Score)
  # and chained comparisons like "18<temp<22" are expanded.
  # examples:
  #   expr:
  #     - "temp>18"
  #     - "SleepScore>80 & HRV>50"
  expr: []

# --- ANALYSIS METRICS ---
# Select which metrics should appear in summary statistics, timelines,
# and metric-driven analysis plots.
# The preferred format is a boolean map of all available metrics.
# When omitted, all default metrics are enabled.
analysis_metrics:
  enabled:
    Avg_Temp: true
    Temp_SD: true
    Avg_Rel_Hum: true
    Rel_Hum_SD: false
    Avg_Abs_Hum: true
    Abs_Hum_SD: false
    Sleep_Score: true
    HRV: true
    RHR: true
    Sleep_Duration: true
  # compatibility: optionally provide a list of metric names instead
  # metrics:
  #   - Avg_Temp
  #   - Sleep_Score
  #   - HRV

# --- OUTLIER FILTER ---
# mode: false/manual/value_interval
# If manual is used, thresholds are applied per metric and any night with
# at least one outlier metric is removed from analysis by default.
# Sleep_Duration thresholds may be entered as "hh:mm" or as decimal hours
# using comma or dot (e.g. "6,5" or "6.5").
#
# In value_interval mode, metric-specific `sym` values define the width of a
# symmetric central interval of the distribution, e.g. `sym: 0.80` means the
# middle 80% of values.
#
# The new `outlier_detection` section lists all metrics and sets whether they
# are considered for exclusion, only marked, or ignored.
#   true  -> exclude the night when this metric is an outlier
#   self  -> mark the metric as outlier, but keep the night for other metrics
#   value -> like self, but also exclude related base metrics (e.g. Temp_SD affects Avg_Temp)
#   false -> ignore this metric for outlier detection entirely
outlier_filter:
  mode: value_interval
  outlier_detection:
    Avg_Temp: true
    Avg_Rel_Hum: value
    Avg_Abs_Hum: value
    Temp_SD: true
    Rel_Hum_SD: value
    Abs_Hum_SD: value
    Sleep_Score: true
    HRV: true
    RHR: true
    Sleep_Duration: true
  manual:
    metrics:
      Avg_Temp:
        min: 15
        max: 27
        # action: true | self | false
      Avg_Rel_Hum:
        min: 30
        max: 60
      Avg_Abs_Hum:
        min: 5
        max: 12
      Temp_SD:
        min: 0
        max: 2
      Rel_Hum_SD:
        min: 0
        max: 5
      Abs_Hum_SD:
        min: 0
        max: 2
      Sleep_Score:
        min: 50
        max: 100
      HRV:
        min: 20
        max: 120
      RHR:
        min: 35
        max: 80
      Sleep_Duration:
        min: "06:00"
        max: "09:00"
  value_interval:
    symmetric: true
    interval: 0.95
    min: 0.5
    max: 0.9
    use_individual: true
    metrics:
      Avg_Temp:
        sym: 0.95
        min: 0.05
        max: 0.95
      Avg_Rel_Hum:
        sym: 1
        min: 0.05
        max: 0.95
      Avg_Abs_Hum:
        sym: 1
        min: 0.05
        max: 0.95
      Temp_SD:
        sym: 1
        min: 0.05
        max: 0.95
      Rel_Hum_SD:
        sym: 1
        min: 0.05
        max: 0.95
      Abs_Hum_SD:
        sym: 1
        min: 0.05
        max: 0.95
      Sleep_Score:
        sym: 0.96
        min: 0.05
        max: 0.95
      HRV:
        sym: 0.97
        min: 0.1
        max: 0.90
      RHR:
        sym: 0.95
        min: 0.05
        max: 0.95
        # action: exclude | self_only | ignore
      Sleep_Duration:
        sym: 0.98
        min: 0.10
        max: 0.90


# --- PLOTTING / VISUALIZATION OPTIONS ---
# colors and labels for metrics used in plots.  Modify as desired.
plot:
  # Plot output mode:
  # - rstudio: use the normal R graphics device and show plots in RStudio
  # - browser: start httpgd for the VS Code/browser plot viewer
  # - both: first render exactly as in 'rstudio', then render the same plots
  #         again to an httpgd browser viewer. This runs the same plotting
  #         logic twice (RStudio then browser) without opening additional
  #         RStudio graphic devices.
  output_mode: "rstudio"
  # When true and output_mode is browser, open the viewer URL in the system
  # browser as soon as the httpgd server is ready.
  auto_open_browser_viewer: true
  # Save generated plots directly to image files.
  # Set enabled to false to keep plots only in the active graphics device.
  # output_dir may be relative (resolved from RScript/) or absolute.
  export:
    enabled: true
    output_dir: "../PlotOutput"
  metric_colors:
    room_temp: "#ff7f0e"    # orange
    rel_hum: "#1f77b4"      # blue
    abs_hum: "#2ca02c"      # green
    Sleep_Score: "#9b59b6"  # purple
    HRV: "#27ae60"          # green
    RHR: "#c0392b"          # red
  metric_labels:
    room_temp: "Room temperature (°C)"
    rel_hum: "Relative humidity (%)"
    abs_hum: "Absolute humidity (g/m³)"
    Sleep_Score: "Sleep Score (pts)"
    HRV: "HRV (ms)"
    RHR: "RHR (bpm)"


# --- GLOBAL PATH SETTINGS ---
# base directory containing dated subfolders with CSV exports
# (usually kept at project root/data)
data_directory: "../data"

# --- PARSING SETTINGS ---
# lists of orders passed to lubridate::parse_date_time
parse_orders:
  garmin_datetime:
    - "Ymd HMS"
    - "Ymd HM"
    - "Y-m-d H:M:S"
    - "Y-m-d H:M"
    - "Y-m-d"
  garmin_time:
    - "H:M"
    - "HM"
  sensor_timestamp:
    - "d/m/Y H:M"
    - "dmY HM"
    - "Ymd HMS"

# locale settings for CSV imports
locale:
  decimal_mark: ","

# matching padding (minutes) applied when matching sensor rows to sleep windows
matching_padding_minutes: 30


# scan behaviour: if recursive is true, every CSV under data_directory (subfolders included)
# will be inspected. Useful when sensor or sleep files are placed in date-named subfolders.
scan_recursive: true

# --- COLUMN MAPPING ---
column_names:
  garmin_date: "Sleep Score 4 Wochen"
  garmin_bedtime: "Schlafenszeit"
  garmin_waketime: "Aufstehzeit"
  garmin_sleep_score: "Score"
  garmin_hrv: "HFV-Status"
  garmin_rhr: "Ruheherzfrequenz"
  garmin_duration: "Dauer"
  garmin_spo2: "Pulsoximeter"
  garmin_skin_temp: "Veränderung der Hauttemperatur"
  garmin_resp: "Atmung"
  garmin_body_bat: "Body Battery"
  garmin_quality: "Qualität"

# --- SENSOR FILES ---
# sensor definitions list each distinct room‑sensor CSV format encountered
# in the data directory.  The path value is only required when you want to
# explicitly identify a file by name; the script will otherwise scan all
# CSVs under `data_directory` and match based on column headers.
#
# Each sensor entry may include an optional `nickname` field.  This provides a
# friendly alias that can be used in calendar metadata (e.g. `sensor=Hochliten`)
# while still mapping back to the canonical config key.  The nickname may be
# a single string or a list of strings if you want multiple acceptable names
# for the same sensor.  The nickname(s) are ignored when reading the CSVs
# themselves and are only used for calendar matching and validation.
#
# add any additional sensors you spot in `data/` here.  In the workspace the
# only sensor present is the ThermometerZimmerFlorian file, so that entry is
# already included below.
#
# NOTE: the older key name `temp_files` is recognised for backwards
# compatibility, but `sensor_files` is now preferred — it more clearly
# describes the purpose.
sensor_files:
  FlorianZimmerSensor: 
    # optional friendly name for calendar events
    nickname: "Zuhause"
    path: "ThermometerZimmerFlorian_data.csv"
    col_time: "Date"
    col_temp: "Temperature_Celsius(℃)"
    col_hum: "Relative_Humidity(%)"
  
  WohnwagenSensor:
    # the caravan sensor has historically been referred to as "Hochliten" or
    # "Hochlitten"; allow several variants plus a plain "Wohnwagen" label so
    # calendar entries can be more forgiving.
    nickname:
      - "Hochlitten"
      - "Hochliten"
      - "Wohnwagen"
      - "WohnwagenSensor"
    path: "Wohnwagen_data.csv"
    col_time: "Date"
    col_temp: "Temperature_Celsius(℃)"
    col_hum: "Relative_Humidity(%)"

# --- QUALITY MAPPING ---
quality_mapping:
  ausgezeichnet: 4
  gut: 3
  befriedigend: 2
  schlecht: 1



# list of Garmin sleep exports; if omitted or incomplete the script will
# also scan all CSVs under data_directory and classify them by header.
# canonicalization: filenames are stripped of trailing " (1)" etc. and any
# name containing "schlaf" becomes simply "Sleep" in summaries.
# leave empty or adjust to match actual filenames; using [] lets the script
# autodetect all sleep files.
sleep_data_sources: []

# --- CALENDAR SOURCE (SENSOR & FLAGS) ---
# optional default sensor name used when no sensor is assigned in the
# calendar.  If unset/NULL the Sensor column will remain NA for those days.
# The name supplied by the calendar may refer either to the config key or to
# a sensor's optional `nickname` (case‑insensitive).  If the script is unable
# to resolve a calendar value to a known sensor it will print a warning and
# prefix the value with "UNKNOWN:" in the Sensor column so you can spot the
# problem.
#
# Calendar events may include metadata in their SUMMARY/DESCRIPTION such as
#   sensor=LivingRoom; flags=quiet,fan
# The parser will recognise a `sensor=` assignment and an optional
# `flag`/`flags=` declaration that can appear after the sensor or in a
# different field; multiple flags may be supplied as a comma-separated list
# (semicolon separators are also tolerated).  The Flags value will appear in
# the calendar output and can be used for filtering.
calendar_default_sensor: "FlorianZimmerSensor"
calendar_source:
  enabled: true
  mode: "url" # options: "url" or "file"
  url: "https://calendar.google.com/calendar/ical/NTEwMjZkNjM5NDRiMWUxNGZkMmQwN2ZiMDk5MGJhYWZlOTY0OGVjNjc5NTVjMGM2NDBhYTYzMGU2MmMyZGIwNUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t/public/basic.ics"
  file_path: ""

calendar_assignment:
  # when true the script only keeps sensor/flag values that appear on the
  # previous and next day as well (three‑day smoothing).  With wake‑date
  # semantics this is usually no longer desired, so the default is now false.
  require_prev_next_day: false
  apply_separately_for_sensor_and_flags: true
  # if true, the first day of a multi‑day calendar event is ignored when
  # assigning sensors/flags.  This is handy for multi‑day “block” entries
  # where the start date should not carry metadata.  A single‑day event will
  # still be applied as usual.
  ignore_event_start: true

calendar_parser:
  tolerant: true
  event_field_priority: ["SUMMARY", "DESCRIPTION"]

# analysis_filter may be used to restrict the dataset after the
# initial run.  It accepts the same fields as the --filter CLI option and
# is merged with any filter provided on the command line (CLI takes
# precedence).  Date ranges cannot be specified in the config; use the
# --filter string for that.
#
# example CLI values:
#   --filter="2025"                    # all of 2025
#   --filter="q1.2025;Flags=Hochlitten"  # first quarter with specific flag
#   --filter="01.2025;Sensors=Wohnwagen" # January 2025 and a sensor
#   --filter="02.02.2026,04.03.2026"     # 2 Feb through 4 Mar 2026
analysis_filter:
  enabled: false
  sensor_include: []
  flags_include: []
  flags_mode: "any" # options: "any" or "all"


# --- PLOTTING / VISUALIZATION OPTIONS ---
# colors and labels for metrics used in plots.  Modify as desired.
plot:
  metric_colors:
    room_temp: "#ff7f0e"    # orange
    rel_hum: "#1f77b4"      # blue
    abs_hum: "#2ca02c"      # green
    Sleep_Score: "#9b59b6"  # purple
    HRV: "#27ae60"          # green
    RHR: "#c0392b"          # red
  metric_labels:
    room_temp: "Room temperature (°C)"
    rel_hum: "Relative humidity (%)"
    abs_hum: "Absolute humidity (g/m³)"
    Sleep_Score: "Sleep Score (pts)"
    HRV: "HRV (ms)"
    RHR: "RHR (bpm)"

